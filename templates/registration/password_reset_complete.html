{% extends 'base.html' %}

{% block title %}Contraseña Cambiada{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">

        <div style="text-align:center; margin-bottom: 2rem;">
            <span class="overline">Cuenta</span>
            <h1 class="section-title mt-1">Contraseña <em>restablecida</em></h1>
            <div class="section-divider mx-auto"></div>
        </div>

        <div class="card-custom">
            <div class="card-body p-4">

                <!-- ícono check -->
                <div style="
                    width: 52px; height: 52px;
                    border-radius: 50%;
                    background: var(--red-mist);
                    border: 1.5px solid var(--red);
                    display: flex; align-items: center; justify-content: center;
                    margin: 0 auto 1.4rem;
                ">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                         stroke="#9B1B30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>

                <p style="font-size:0.9rem; color:#555; text-align:center; line-height:1.65; margin-bottom:2rem;">
                    Tu contraseña ha sido cambiada exitosamente.<br>
                    Ya puedes iniciar sesión con tu nueva contraseña.
                </p>

                <a href="{% url 'login' %}" class="btn-primary-custom d-block text-center text-decoration-none">
                    Iniciar sesión
                </a>

            </div>
        </div>

    </div>
</div>
{% endblock %}
